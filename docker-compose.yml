services:
  backend:
    container_name: tracker-service_backend_1
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - bridge
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo:27017/tracker
      - LOG_LEVEL=info
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - ./config:/app/public:ro
    restart: unless-stopped

  mongo:
    container_name: tracker-service_mongo_1
    image: mongo:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bridge
    volumes:
      - tracker-mongo-data:/data/db

networks:
  bridge:
    driver: bridge

volumes:
  tracker-mongo-data:
