openapi: 3.0.3
info:
  title: Tracker Service
  description: GPS tracking microservice. Devices register and stream location pings; a dashboard reads history.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /devices/register:
    post:
      summary: Register a new device and receive an API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Device created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceWithKey'
        '200':
          description: Device already existed; returning existing record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceWithKey'
        '400':
          description: Invalid input

  /devices:
    get:
      summary: List all registered devices (no API keys returned)
      responses:
        '200':
          description: A list of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'

  /location:
    post:
      summary: Record a GPS ping
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationPing'
      responses:
        '201':
          description: Stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid lat/lng
        '401':
          description: Missing or invalid API key

  /location/{deviceId}/history:
    get:
      summary: Fetch stored locations for a device, newest first
      parameters:
        - in: path
          name: deviceId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 1000
            maximum: 10000
      responses:
        '200':
          description: History payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  deviceId:
                    type: string
                  count:
                    type: integer
                  locations:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoredLocation'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    RegisterRequest:
      type: object
      required: [deviceId, name, type]
      properties:
        deviceId:
          type: string
          description: Stable client-generated ID (e.g. uuid persisted in expo-secure-store)
        name:
          type: string
        type:
          type: string
          enum: [cyclist, car, truck, scooter]

    Device:
      type: object
      properties:
        deviceId:
          type: string
        name:
          type: string
        type:
          type: string
        createdAt:
          type: string
          format: date-time

    DeviceWithKey:
      allOf:
        - $ref: '#/components/schemas/Device'
        - type: object
          properties:
            apiKey:
              type: string

    LocationPing:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        speed:
          type: number
          description: Optional, m/s
        timestamp:
          type: string
          format: date-time
          description: Optional; server time used if omitted

    StoredLocation:
      type: object
      properties:
        _id:
          type: string
        deviceId:
          type: string
        lat:
          type: number
        lng:
          type: number
        speed:
          type: number
        timestamp:
          type: string
          format: date-time
